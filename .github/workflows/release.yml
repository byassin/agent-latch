name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build x64
        run: |
          cmake -S . -B build-x64 -A x64 -DAGENTLATCH_VERSION_LABEL_OVERRIDE='${{ steps.version.outputs.version }}'
          cmake --build build-x64 --config Release --parallel

      - name: Verify x64
        shell: pwsh
        run: |
          $process = Start-Process -FilePath .\build-x64\Release\AgentLatch.exe -ArgumentList '--self-test' -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "AgentLatch self-test failed with exit code $($process.ExitCode)."
          }
          .\tests\integration-installer.tests.ps1 -AgentLatchPath .\build-x64\Release\AgentLatch.exe
          .\tests\install.tests.ps1 -AgentLatchPath .\build-x64\Release\AgentLatch.exe

      - name: Build ARM64
        run: |
          cmake -S . -B build-arm64 -A ARM64 -DAGENTLATCH_VERSION_LABEL_OVERRIDE='${{ steps.version.outputs.version }}'
          cmake --build build-arm64 --config Release --parallel

      - name: Install pinned Inno Setup compiler
        shell: pwsh
        run: |
          $innoInstaller = Join-Path $env:RUNNER_TEMP 'innosetup-7.0.2-x64.exe'
          Invoke-WebRequest 'https://github.com/jrsoftware/issrc/releases/download/is-7_0_2/innosetup-7.0.2-x64.exe' -OutFile $innoInstaller
          $expectedHash = '5ad54ca3def786f8f4212552e54cc6d8d61329e2d24a1cfee0571d42c2684ff1'
          $actualHash = (Get-FileHash -LiteralPath $innoInstaller -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Inno Setup checksum mismatch: $actualHash"
          }
          $process = Start-Process -FilePath $innoInstaller -ArgumentList @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/CURRENTUSER') -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Inno Setup installation failed with exit code $($process.ExitCode)."
          }

      - name: Build setup executables
        shell: pwsh
        run: |
          .\scripts\build-installer.ps1 -Executable .\build-x64\Release\AgentLatch.exe -Architecture x64 -Version '${{ steps.version.outputs.version }}'
          .\scripts\build-installer.ps1 -Executable .\build-arm64\Release\AgentLatch.exe -Architecture ARM64 -Version '${{ steps.version.outputs.version }}'
          .\scripts\build-installer.ps1 -Executable .\build-x64\Release\AgentLatch.exe -Architecture x64 -Version '${{ steps.version.outputs.version }}' -OutputDirectory .\dist-test -TestBuild
          .\tests\installer.tests.ps1 -InstallerPath ".\dist-test\AgentLatch-Setup-${{ steps.version.outputs.version }}-x64-test.exe"
          Get-ChildItem .\dist\*.sha256 | ForEach-Object { Get-Content $_ } | Set-Content .\dist\SHA256SUMS.txt -Encoding ascii

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AgentLatch-release-${{ steps.version.outputs.version }}
          path: |
            dist/*.exe
            dist/*.sha256
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(Get-ChildItem .\dist -File | Where-Object { $_.Extension -in @('.exe', '.sha256', '.txt') } | ForEach-Object { $_.FullName })
          $releaseArguments = @('--verify-tag', '--generate-notes', '--title', 'AgentLatch ${{ github.ref_name }}')
          if ('${{ steps.version.outputs.version }}' -match '-') {
            $releaseArguments += '--prerelease'
          }
          gh release create '${{ github.ref_name }}' @assets @releaseArguments
