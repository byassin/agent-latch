name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build x64
        run: |
          cmake -S . -B build-x64 -A x64
          cmake --build build-x64 --config Release --parallel

      - name: Verify x64
        shell: pwsh
        run: |
          $process = Start-Process -FilePath .\build-x64\Release\AgentLatch.exe -ArgumentList '--self-test' -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "AgentLatch self-test failed with exit code $($process.ExitCode)."
          }
          .\tests\integration-installer.tests.ps1 -AgentLatchPath .\build-x64\Release\AgentLatch.exe

      - name: Build ARM64
        run: |
          cmake -S . -B build-arm64 -A ARM64
          cmake --build build-arm64 --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          .\scripts\package.ps1 -Executable .\build-x64\Release\AgentLatch.exe -Architecture x64 -Version '${{ steps.version.outputs.version }}'
          .\scripts\package.ps1 -Executable .\build-arm64\Release\AgentLatch.exe -Architecture ARM64 -Version '${{ steps.version.outputs.version }}'
          Get-ChildItem .\dist\*.sha256 | ForEach-Object { Get-Content $_ } | Set-Content .\dist\SHA256SUMS.txt -Encoding ascii

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AgentLatch-release-${{ steps.version.outputs.version }}
          path: |
            dist/*.zip
            dist/*.sha256
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(Get-ChildItem .\dist -File | Where-Object { $_.Extension -in @('.zip', '.sha256', '.txt') } | ForEach-Object { $_.FullName })
          gh release create '${{ github.ref_name }}' @assets --verify-tag --generate-notes --title 'AgentLatch ${{ github.ref_name }}'
